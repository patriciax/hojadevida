server {
    listen 80;
    server_name app.hojadevida.digital;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name app.hojadevida.digital/cv/;

    root /usr/share/nginx/html/cv/;
    index index.html index.htm;

    location /cv/ {
        try_files $uri $uri/ /index.html;
    }
}